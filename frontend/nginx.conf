server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Toutes les routes non-fichier → index.html (routing React côté client)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets buildés par React (hash dans le nom de fichier)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pas de cache pour index.html (pour détecter les nouveaux builds)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}